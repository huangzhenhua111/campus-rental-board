<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>发布房源</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main>
    <header class="page-header">
      <div>
        <h1>发布房源</h1>
        <p>可以直接粘贴 QQ 群消息，再补充联系方式和图片。</p>
      </div>
      <a class="text-link" href="/">返回首页</a>
    </header>

    <section class="post-section post-section--focused">
      <form id="listing-form" class="listing-form">
        <label>
          房源描述 / 群消息
          <textarea name="description" rows="6" placeholder="可以直接粘贴 QQ 群里的房源消息，比如位置、价格、入住时间、设施、要求等" required></textarea>
        </label>

        <label>
          联系方式
          <input name="contact_method" type="text" placeholder="微信 / QQ / 电话" required />
        </label>

        <div class="form-grid">
          <label>
            月租价格 <span class="field-note">选填</span>
            <input name="price" type="number" placeholder="1200" />
          </label>

          <label>
            位置 <span class="field-note">选填</span>
            <input name="location" type="text" placeholder="学校东门 / 海悦 / 校内" />
          </label>
        </div>

        <label>
          房源图片 <span class="field-note">选填</span>
          <input id="image-files" name="images" type="file" accept="image/*" multiple />
        </label>

        <div id="image-preview-list" class="image-preview-list"></div>

        <details class="optional-fields">
          <summary>补充更多信息</summary>

          <div class="form-grid optional-grid">
            <label>
              标题 <span class="field-note">选填</span>
              <input name="title" type="text" placeholder="山大东门附近单间转租" />
            </label>

            <label>
              详细地址 <span class="field-note">选填</span>
              <input name="address" type="text" placeholder="某小区 / 某公寓" />
            </label>

            <label>
              房源类型 <span class="field-note">选填</span>
              <select name="rental_type">
                <option value="">请选择</option>
                <option value="单间">单间</option>
                <option value="合租">合租</option>
                <option value="整租">整租</option>
                <option value="转租">转租</option>
              </select>
            </label>

            <label>
              可入住时间 <span class="field-note">选填</span>
              <input name="available_from" type="date" />
            </label>

            <label>
              租期 <span class="field-note">选填</span>
              <input name="lease_term" type="text" placeholder="3个月起租" />
            </label>

            <label>
              联系人 <span class="field-note">选填</span>
              <input name="contact_name" type="text" placeholder="张同学" />
            </label>
          </div>

          <label>
            租客要求 <span class="field-note">选填</span>
            <textarea name="requirements" rows="3" placeholder="比如希望爱干净、不养宠物等"></textarea>
          </label>
        </details>

        <button type="submit" id="submit-btn">提交房源</button>
        <p id="form-message" class="form-message"></p>
      </form>
    </section>
  </main>

  <div id="success-modal" class="modal-backdrop" hidden>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="success-modal-title">
      <div class="modal-header">
        <div>
          <h2 id="success-modal-title">房源发布成功</h2>
          <p>请保存这个管理链接，之后下架房源需要用它。</p>
        </div>
        <button id="close-success-modal" class="icon-button" type="button" aria-label="关闭">×</button>
      </div>

      <label>
        管理链接
        <input id="manage-url-input" type="text" readonly />
      </label>

      <p id="copy-message" class="copy-message"></p>

      <div class="modal-actions">
        <button id="copy-manage-url" type="button">复制链接</button>
        <a id="open-manage-url" class="secondary-link-button" href="#">打开管理页</a>
      </div>
    </section>
  </div>

  <script src="/static/post.js"></script>
</body>
</html>
